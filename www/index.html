<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>srVR</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background: #050816;
        color: #e5e7eb;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      .card {
        background: radial-gradient(circle at top, #111827, #020617 55%);
        border-radius: 18px;
        padding: 2.5rem 3rem;
        box-shadow: 0 20px 45px rgba(0, 0, 0, 0.6);
        border: 1px solid rgba(148, 163, 184, 0.25);
        max-width: 640px;
      }
      h1 {
        margin: 0 0 0.5rem;
        font-size: 2rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #38bdf8;
      }
      p {
        margin: 0.35rem 0;
        line-height: 1.6;
        color: #9ca3af;
      }
      code {
        background: rgba(15, 23, 42, 0.9);
        padding: 0.1rem 0.4rem;
        border-radius: 6px;
        font-size: 0.9rem;
        color: #e5e7eb;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        padding: 0.25rem 0.7rem;
        border-radius: 999px;
        border: 1px solid rgba(55, 65, 81, 0.9);
        background: rgba(15, 23, 42, 0.9);
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: #9ca3af;
        margin-bottom: 1.25rem;
      }
      .dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: #22c55e;
        box-shadow: 0 0 14px rgba(34, 197, 94, 0.8);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="badge">
        <span class="dot"></span>
        <span>srVR http server</span>
      </div>
      <h1>It works.</h1>
      <p>
        This response is being served by your
        <strong>srVR</strong> mini HTTP server — a tiny,
        educational, Nginx‑style C server.
      </p>
      <p>
        Try requesting another file from the
        <code>www/</code>
        directory or sending a
        <code>POST</code>
        request with a body to see how the request parsing behaves.
      </p>
    </main>
  </body>
  </html>
